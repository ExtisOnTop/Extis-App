name: Build iOS (unsigned, AltStore .ipa)

on:
  push:
    branches: [ main, master, extis ]
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.app

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.x

      - name: Pub upgrade (resolve newer deps)
        run: flutter pub upgrade --major-versions || flutter pub get

      - name: Set up Cocoapods
        run: |
          gem install cocoapods --no-document
          flutter --version
          flutter doctor

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Xcode project (no build yet)
        run: flutter build ios --release --no-codesign --config-only

      - name: Build via xcodebuild (no codesign)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -allowProvisioningUpdates \
            build

      - name: Pack unsigned .ipa
        run: |
          APP_PATH=$(find ios/build/derived/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -type d | head -1)
          [ -z "$APP_PATH" ] && APP_PATH=$(find build/ios/iphoneos -maxdepth 1 -name "*.app" -type d | head -1)
          echo "APP: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/Extis.app
          zip -qr Extis-unsigned.ipa Payload
          ls -lh Extis-unsigned.ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Extis-unsigned-ipa
          path: Extis-unsigned.ipa
          retention-days: 30
